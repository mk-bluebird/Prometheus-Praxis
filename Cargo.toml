# filename: Cargo.toml
# destination: eco_restoration_shard/Cargo.toml

[workspace]
members = [
    "eco_response_shard",              # core library (non-actuating)
    "eco_response_shard_cilib",        # CI helpers (non-actuating)
    "eco_response_shard_backfill",     # one-time backfill binary
    "eco_restoration_shard",           # restoration governance/tooling crate (non-actuating)
    "crates/eco-ledger-particles",     # regional eco-ledger particles (non-actuating)
    "crates/hydrology-constraints",    # hydrology/gw-risk constraint catalog (non-actuating)
]

resolver = "2"

[workspace.package]
edition      = "2021"
license      = "MIT OR Apache-2.0"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
homepage     = "https://github.com/mk-bluebird/eco_restoration_shard"
repository   = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.75"

[workspace.dependencies]
rusqlite   = { version = "0.31", default-features = false, features = ["bundled"] }
serde      = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.115"
chrono     = { version = "0.4.38", features = ["serde"] }
thiserror  = "1.0.57"
log        = "0.4.21"
env_logger = "0.11.3"

[workspace.dev-dependencies]
serde_json = "1.0.115"

[package]
name        = "eco_restoration_shard"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
description = "Eco restoration shard index and research harness for the EcoNet constellation."
repository  = "https://github.com/mk-bluebird/eco_restoration_shard"

[lib]
name       = "eco_restoration_shard"
path       = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "restoration_index_tool"
path = "src/bin/restoration_index_tool.rs"

[features]
default       = ["non_actuating"]
non_actuating = []

[dependencies]
rusqlite   = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
chrono     = { workspace = true }
thiserror  = { workspace = true }
log        = { workspace = true }
env_logger = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[patch.crates-io]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto   = true
