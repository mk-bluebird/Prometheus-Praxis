# FILE: Cargo.toml
# DESTINATION: ./Cargo.toml
# TARGET-REPO: github.com/mk-bluebird/eco_restoration_shard

[workspace]
members = [
    # Root eco_restoration_shard crate (code in ecorestorationshard/)
    "ecorestorationshard",

    # Crates under `crates/` (matching actual directory names exactly)
    "crates/bioscale-fairness-validator",
    "crates/bioscale_evolution_cli",
    "crates/blacklist_filter",
    "crates/blastradius",
    "crates/bostrom-cli",
    "crates/bostrom-signer",
    "crates/cargo-blast-radius",
    "crates/city-pass",
    "crates/community-governance",
    "crates/cross-constellation-index",
    "crates/cyboquatic_benchmark_tool",
    "crates/cyboquatic_index",
    "crates/cyboquatic_spine",
    "crates/definition_registry_checker",
    "crates/disaster-scenarios",
    "crates/eco-chat-ffi",
    "crates/eco-ledger-particles",
    "crates/eco-pricing",
    "crates/eco-restoration-governance",
    "crates/eco_restoration_index",
    "crates/eco_restoration_shard_config",
    "crates/ecocybo_planner",
    "crates/econet_governance_guard",
    "crates/econet_governance_spine",
    "crates/econet_overlay",
    "crates/ecoper-joule",
    "crates/ecoresponseshard",
    "crates/ecorestorationshard",
    "crates/education-prompts",
    "crates/energy-metrics",
    "crates/ersilogger",
    "crates/governance-guard",
    "crates/hydrology-constraints",
    "crates/ker-score-lab",
    "crates/kerdeployable",
    "crates/kerresidual",
    "crates/lake_risk_init",
    "crates/lane-governance",
    "crates/large-particle-registry",
    "crates/plane-weights",
    "crates/prometheus_praxis",
    "crates/psychrisk_engine",
    "crates/restoration-radius",
    "crates/sensor-health",
    "crates/sensor-telemetry",
    "crates/topology-risk",
    "crates/eco-wealth-portfolio",
    "crates/ai_chat_hashonly_normalizer",
    "crates/ppx_continuity_kernel",
    "crates/ppx_continuity_mcp"
]

resolver = "2"

[workspace.package]
edition      = "2024"
license      = "MIT OR Apache-2.0"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
homepage     = "https://github.com/mk-bluebird/eco_restoration_shard"
repository   = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.85"
version      = "0.2.0"
description  = "Eco restoration shard repository with Cyboquatic eco-machinery, KER governance, and EcoNet constellation indexing."

[workspace.dependencies]
# Core non-actuating stack, pinned for deterministic builds
rusqlite      = { version = "0.31", default-features = false, features = ["bundled"] }
serde         = { version = "1.0.197", features = ["derive"] }
serde_json    = "1.0.115"
serde_yaml    = "0.9"
chrono        = { version = "0.4.38", features = ["serde"] }
thiserror     = "1.0.57"
log           = "0.4.21"
env_logger    = "0.11.3"

# Graph and hex utilities
petgraph      = "0.6.5"
hex           = "0.4.3"

# Crypto and signatures
ed25519-dalek = "2.1"

# Async runtime (non-network, no actuation)
tokio         = { version = "1.38", features = ["rt", "macros", "time", "io-util", "sync", "fs"] }

# Proc-macro toolchain for internal derives
proc-macro2   = "1.0"
quote         = "1.0"
syn           = { version = "2.0", features = ["full"] }

# ALN / MCP integration (non-optional at workspace level; individual crates gate usage via features)
aln-core      = { version = "0.1.0", package = "aletheion-aln-core" }
mcp-core      = { version = "0.1.0", package = "aletheion-mcp-core" }

# Kani is required, never optional; wired at workspace level
kani          = { version = "0.50.0" }

[workspace.dev-dependencies]
serde_json = "1.0.115"
csv        = "1.3"
kani       = { version = "0.50.0" }

[workspace.features]
# Workspace-level feature toggles for integration; not used to make kani optional.
default = ["sqlite", "aln"]
sqlite  = ["rusqlite"]
aln     = ["aln-core"]
mcp     = ["mcp-core"]

[workspace.lints.rust]
unsafe_code  = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
all      = "warn"
pedantic = "warn"
nursery  = "warn"

[profile.dev]
panic           = "abort"
overflow-checks = true

[profile.release]
panic           = "abort"
lto             = "fat"
overflow-checks = true
opt-level       = 2
strip           = "symbols"
codegen-units   = 1

[profile.test]
overflow-checks = true

[profile.bench]
inherits = "release"
strip    = "none"
debug    = true

[workspace.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[workspace.metadata.release]
publish    = false
tag-prefix = "v"
sign-tag   = true

[workspace.metadata.aln]
minschemaversion = "1.0.0"
hexanchor        = "0xECO2026RESTORATIONSHARD_bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
rohceiling       = 0.30

[package]
name         = "ecorestorationshard"
version      = "0.2.0"
edition      = "2024"
license      = "MIT OR Apache-2.0"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
repository   = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.85"
description  = "Eco restoration shard index and research harness for the EcoNet constellation."
publish      = false

[lib]
name       = "ecorestorationshard"
path       = "ecorestorationshard/src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "restorationindextool"
path = "ecorestorationshard/src/bin/restorationindextool.rs"

[features]
# Default strictly non-actuating index surface.
default      = ["nonactuating"]
nonactuating = []

[dependencies]
rusqlite      = { workspace = true }
serde         = { workspace = true }
serde_json    = { workspace = true }
serde_yaml    = { workspace = true }
chrono        = { workspace = true }
thiserror     = { workspace = true }
log           = { workspace = true }
env_logger    = { workspace = true }
petgraph      = { workspace = true }
hex           = { workspace = true }
ed25519-dalek = { workspace = true }
tokio         = { workspace = true }
aln-core      = { workspace = true }
mcp-core      = { workspace = true }
kani          = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
csv        = { workspace = true }
kani       = { workspace = true }

[patch.crates-io]
# Intentionally empty; reserved for audited security compatibility patches.
