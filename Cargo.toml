# filename: Cargo.toml
# destination: ./Cargo.toml
# target-repo: github.com/mk-bluebird/eco_restoration_shard

[workspace]
members = [
    # Root eco_restoration_shard crate (code in eco_restoration_shard/)
    "eco_restoration_shard",

    # Task / tool crates under eco_restoration_shard/
    "eco_restoration_shard/T08_sensor_health",
    "eco_restoration_shard/T10_pricing",

    # Crates under `crates/` (exactly matching your directory listing)
    "crates/adaptive-corridors",
    "crates/bioscale-fairness-validator",
    "crates/bioscale_evolution_cli",
    "crates/blacklist_filter",
    "crates/blastradius",
    "crates/bostrom-cli",
    "crates/bostrom-signer",
    "crates/cargo-blast-radius",
    "crates/community-governance",
    "crates/constellation-logic-auto",
    "crates/cross-constellation-index",
    "crates/cyboquatic-ecosafety-core",
    "crates/datalake_core",
    "crates/disaster-scenarios",
    "crates/eco-ledger-particles",
    "crates/eco-pricing",
    "crates/eco-restoration-governance",
    "crates/eco-wealth-portfolio",
    "crates/eco_r_axis_verifier",
    "crates/eco_restoration_shard",
    "crates/eco_zk_aggregate",
    "crates/econet-index",
    "crates/econet_blastradius_spine",
    "crates/econet_ceim_phoenixwater",
    "crates/ecoper-joule",
    "crates/ecorestorationshard",
    "crates/ecosafety-core",
    "crates/ecosafety_sqlite_index",
    "crates/education-prompts",
    "crates/energy-metrics",
    "crates/federated-ker",
    "crates/hydraulics-kernels",
    "crates/hydrology-constraints",
    "crates/kerresidual",
    "crates/lane-governance",
    "crates/large-particle-registry",
    "crates/neuromorphic-risk",
    "crates/plane-weights",
    "crates/restoration-radius",
    "crates/round-trip-verify",
    "crates/sensor-health",
    "crates/sensor-telemetry",
    "crates/topology-risk",
    "crates/zoning-shards",
    "crates/lake_risk_init",
]
resolver = "2"

[workspace.package]
edition      = "2024"
license      = "MIT OR Apache-2.0"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
homepage     = "https://github.com/mk-bluebird/eco_restoration_shard"
repository   = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.85"
version      = "0.2.0"
description  = "Eco restoration shard repository with Cyboquatic eco-machinery, KER governance, and EcoNet constellation indexing."  # aligned with prior workspace description [file:25]

[workspace.dependencies]
# Core non-actuating stack (aligned with prior ecosafety / econet-index configs) [file:13][file:25]
rusqlite        = { version = "0.31", default-features = false, features = ["bundled"] }
serde           = { version = "1.0.197", features = ["derive"] }
serde_json      = "1.0.115"
chrono          = { version = "0.4.38", features = ["serde"] }
thiserror       = "1.0.57"
log             = "0.4.21"
env_logger      = "0.11.3"

# Graphs, hex-stamping, signatures (used by econetrepoindex / definitionregistry lines) [file:7][file:13]
petgraph        = "0.6.5"
hex             = "0.4.3"
ed25519-dalek   = "2.1"

# Async stack constrained to non-actuating research (no net features enabled) [file:13][file:25]
tokio           = { version = "1.38", features = ["rt", "macros", "time", "io-util", "sync", "fs"] }

# ALN parsing / proc-macro stubs (aligned with existing aln-ast / aln-derive design) [file:25]
serde_yaml      = "0.9"
proc-macro2     = "1.0"
quote           = "1.0"
syn             = { version = "2.0", features = ["full"] }

[workspace.dev-dependencies]
serde_json = "1.0.115"
csv        = "1.3"   # for batch / stake CSV generation and RFC4180 compliance tools [file:7]

[workspace.lints.rust]
unsafe_code  = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
all      = "warn"
pedantic = "warn"
nursery  = "warn"

# =============================================================================
# Root Package Definition (eco_restoration_shard)
# =============================================================================

[package]
name        = "eco_restoration_shard"
version     = "0.2.0"
edition.workspace      = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
rust-version.workspace = true
description            = "Eco restoration shard index and research harness for the EcoNet constellation."
publish                = false

[lib]
name       = "eco_restoration_shard"
path       = "eco_restoration_shard/src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "restoration_index_tool"
path = "eco_restoration_shard/src/bin/restoration_index_tool.rs"

[features]
default       = ["non_actuating"]
non_actuating = []

[dependencies]
rusqlite   = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
chrono     = { workspace = true }
thiserror  = { workspace = true }
log        = { workspace = true }
env_logger = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
csv        = { workspace = true }

# =============================================================================
# Profile Configuration - deterministic IEEE-754 friendly settings
# =============================================================================

[profile.dev]
panic            = "abort"
overflow-checks  = true

[profile.release]
panic           = "abort"
lto             = "fat"
overflow-checks = true
opt-level       = 2
strip           = "symbols"
codegen-units   = 1

[profile.test]
overflow-checks = true

[profile.bench]
inherits   = "release"
strip      = "none"
debug      = true

# =============================================================================
# Target-specific rustflags (must be set via .cargo/config.toml in 2024 editions)
# =============================================================================
# Note: per-target rustflags are typically configured in .cargo/config.toml
# rather than Cargo.toml; kept here as documentation for the expected setup. [file:13]

# =============================================================================
# Workspace metadata
# =============================================================================

[workspace.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[workspace.metadata.release]
publish   = false
tag-prefix = "v"
sign-tag   = true

[workspace.metadata.aln]
min_schema_version = "1.0.0"
hex_anchor         = "0xECO_2026_RESTORATION_SHARD_bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
roh_ceiling        = 0.30

# =============================================================================
# Patches (reserved for security fixes / compatibility)
# =============================================================================

[patch.crates-io]
# Intentionally empty; fill only for audited security / compatibility patches.
