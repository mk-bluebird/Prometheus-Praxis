# Workspace root manifest for eco_restoration_shard constellation
# Invariant: every member path has a `Cargo.toml` and at least one target.

[workspace]
members = [
    # Core restoration shard (root package)
    ".",
    # Crates with valid manifests
    "crates/eco_restoration_shard",
    "ecorestorationshard/eco_restoration_shard_core",
]
resolver = "2"

[workspace.package]
edition      = "2021"
license      = "MIT OR Apache-2.0"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
homepage     = "https://github.com/mk-bluebird/eco_restoration_shard"
repository   = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.75"

[workspace.dependencies]
rusqlite   = { version = "0.31", default-features = false, features = ["bundled"] }
serde      = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.115"
chrono     = { version = "0.4.38", features = ["serde"] }
thiserror  = "1.0.57"
log        = "0.4.21"
env_logger = "0.11.3"

[workspace.dev-dependencies]
serde_json = "1.0.115"

[package]
name        = "eco_restoration_shard_root"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
description = "Root workspace package for eco_restoration_shard constellation."
repository  = "https://github.com/mk-bluebird/eco_restoration_shard"

[lib]
name       = "eco_restoration_shard_root"
path       = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "restoration_index_tool"
path = "src/bin/restoration_index_tool.rs"

[features]
default       = ["non_actuating"]
non_actuating = []

[dependencies]
rusqlite   = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
chrono     = { workspace = true }
thiserror  = { workspace = true }
log        = { workspace = true }
env_logger = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[patch.crates-io]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto   = true
