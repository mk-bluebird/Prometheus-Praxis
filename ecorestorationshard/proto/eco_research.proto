// filename: proto/eco_research.proto
// destination: ecorestorationshard/proto/eco_research.proto
syntax = "proto3";

package bostrom.eco.v1;

// -----------------------------------------------------------------------------
// 18. MsgContributeResearchArtifact
// -----------------------------------------------------------------------------

// Enumerates broad artifact classes. Additional types can be added by governance.
enum ArtifactType {
  ARTIFACT_TYPE_UNSPECIFIED = 0;
  ARTIFACT_ALGORITHM        = 1;
  ARTIFACT_CIRCUIT          = 2;
  ARTIFACT_PROTOCOL         = 3;
  ARTIFACT_DESIGN_DOC       = 4;
  ARTIFACT_DATASET_SCHEMA   = 5;
}

// Optional eco-impact estimate with oracle attestation.
message EstimatedEcoImpact {
  double co2e_delta_kg     = 1; // Estimated CO2e reduction (kg).
  double energy_delta_kwh  = 2; // Estimated energy impact (kWh).
  string impact_oracle     = 3; // Oracle address attesting to estimate.
  string impact_report_cid = 4; // CID for detailed assessment.
}

// MsgContributeResearchArtifact records a permanent research contribution.
message MsgContributeResearchArtifact {
  string              artifact_cid           = 1; // CID of artifact content (code, paper, etc.).
  ArtifactType        artifact_type         = 2; // High-level class of artifact.
  EstimatedEcoImpact  estimated_eco_impact  = 3; // Optional eco-impact with oracle attestation.
  string              contributor_address   = 4; // Must equal primary Bostrom address.
  bytes               brain_bound_signature = 5; // Signature over artifact_cid by brain-bound key.
  int64               timestamp_unix_sec    = 6; // Wall-clock time of contribution (UTC).

  // Handler MUST:
  // - Enforce contributor_address == bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7 for this host.
  // - Verify brain_bound_signature over artifact_cid.
  // - Insert immutable record into host's contribution graph.
}
