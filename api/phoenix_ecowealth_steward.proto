// filename: api/phoenix_ecowealth_steward.proto
// destination: eco_restoration_shard/api/phoenix_ecowealth_steward.proto

syntax = "proto3";

package phoenix.ecowealth;

// 25. Non-actuating gRPC service for steward EcoWealth view.
// This API is strictly read-only and exposes vecowealthview rows.

service EcoWealthQuery {
  // GET /phoenix/ecowealth/steward/{did}
  //
  // Returns all vecowealthview rows for a given steward DID.
  // Implementation MUST be read-only against the underlying SQLite DB
  // and MUST NOT invoke any actuator-facing crates.
  rpc GetStewardEcoWealth (GetStewardEcoWealthRequest)
      returns (GetStewardEcoWealthResponse);
}

message GetStewardEcoWealthRequest {
  // Bostrom DID of the steward, e.g. bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7
  string steward_did = 1;

  // Optional lane filter: RESEARCH, PILOT, PROD, etc.
  string lane = 2;

  // Optional window bounds; if omitted, returns all vecowealthview rows
  // for this steward.
  string window_start_utc = 3;
  string window_end_utc   = 4;
}

message EcoWealthRow {
  string steward_did        = 1;
  string region             = 2;
  string lane               = 3;
  string window_start_utc   = 4;
  string window_end_utc     = 5;

  double k_mean             = 6;
  double e_mean             = 7;
  double r_mean             = 8;
  double r_max              = 9;
  double vt_max_window      = 10;

  double governance_penalty = 11;
  double dataqualityfactor  = 12;

  double k_adjusted         = 13;
  double e_adjusted         = 14;
  double r_adjusted         = 15;

  double ecounit_final      = 16;

  string ecowealth_kernel_id = 17;
  string plane_contract_id   = 18;
  string corridor_set_id     = 19;
  string lane_policy_id      = 20;

  string vshardker_window_hash = 21;
  string shardlist_hash        = 22;
  string evidence_hex          = 23;
}

message GetStewardEcoWealthResponse {
  repeated EcoWealthRow rows = 1;
}
