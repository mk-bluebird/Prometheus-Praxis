apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus-core
  namespace: prometheus-praxis
  labels:
    app: prometheus-core
spec:
  serviceName: prometheus-core
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-core
  template:
    metadata:
      labels:
        app: prometheus-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=90d"
            - "--storage.tsdb.retention.size=50GB"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
              - key: eco_ker_rules.yml
                path: rules/eco_ker_rules.yml
              - key: eco_alerts.yml
                path: rules/eco_alerts.yml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
