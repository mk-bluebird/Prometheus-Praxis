apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: prometheus-praxis
data:
  grafana.ini: |
    [server]
    domain = grafana.local
    root_url = %(protocol)s://%(domain)s/
    serve_from_sub_path = false

    [security]
    admin_user = admin
    admin_password = change_me

  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false

  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: "EcoNet Dashboards"
        orgId: 1
        folder: "EcoNet"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards

  econet_ker_dashboard.json: |
    {
      "id": null,
      "uid": "econet-ker",
      "title": "EcoNet KER and Vt",
      "tags": ["econet", "ker", "vt"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "panels": [],
      "time": {
        "from": "now-6h",
        "to": "now"
      }
    }
