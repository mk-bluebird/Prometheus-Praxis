global:
  scrape_interval: 15s
  evaluation_interval: 30s
  scrape_timeout: 10s

  external_labels:
    environment: "local"
    stack: "prometheus-praxis"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "localhost:9100"

  # Placeholder for ecosafety exporters (EcoNet / Cyboquatic nodes)
  - job_name: "econet-nodes"
    metrics_path: "/metrics"
    static_configs:
      - targets: []
