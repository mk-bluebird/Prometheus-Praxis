# filename: eco_restoration_shard/T08_sensor_health/Cargo.toml

[package]
name = "T08_sensor_health"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Non-actuating sensor health diagnostics for EcoNet / Cyboquatic nodes."
publish = false

[dependencies]
serde  = { version = "1.0.197", features = ["derive"] }
chrono = { version = "0.4.38", features = ["serde"] }
thiserror = "1.0.57"

[dev-dependencies]
serde_json = "1.0.115"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]

[lib]
name = "t08_sensor_health"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "t08_sensor_health_cli"
path = "src/main.rs"
