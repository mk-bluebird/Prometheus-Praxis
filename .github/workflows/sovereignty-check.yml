# filename: .github/workflows/sovereignty-check.yml
# destination: eco_restoration_shard/.github/workflows/sovereignty-check.yml

name: sovereignty-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  sovereignty-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-sovereignty-${{ hashFiles('**/Cargo.lock') }}

      - name: Build governance binaries
        run: cargo build --workspace --all-targets

      - name: Run sovereignty checks (non-actuating)
        env:
          SOVEREIGNTY_DB_PATH: governance/db/governance_spine.sqlite3
        run: |
          cargo test -p governance --tests -- --ignored sovereignty_ --nocapture
