name: ALN Schema Integrity & KER Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'spine/aln-platform/**/*.aln'
      - 'spine/econet/**/*.aln'
      - 'qpudatashards/**/*.csv'
      - 'qpudatashards/**/*.aln'
  pull_request:
    branches: [ main ]

jobs:
  aln-integrity-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout consolidated repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Install SQLite
      run: sudo apt-get update && sudo apt-get install -y sqlite3

    - name: Verify ALN frozen schemas unchanged
      run: |
        cd spine/aln-platform/migrations
        sqlite3 :memory: < aln_migration_schema_preservation.sql
        if [ $? -ne 0 ]; then
          echo "::error::ALN frozen schema verification failed"
          exit 1
        fi

    - name: Check Bostrom DID signatures
      run: |
        echo "Verifying signing_did integrity..."
        find . -name "*.aln" -exec grep -l "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7" {} \; | wc -l

    - name: Validate qpudatashard RFC4180 compliance
      run: |
        cd spine/econet
        cargo build --release --bin qpudata-validator
        find ../../qpudatashards -name "*.csv" -exec ./target/release/qpudata-validator {} \;

    - name: Compute KER scores for modified shards
      run: |
        cd spine/econet
        cargo run --release --bin ker-scorer -- --input ../../qpudatashards --threshold K=0.90,E=0.90,R=0.13

    - name: Check no corridor widening
      run: |
        echo "Verifying corridors only tightened (gold_band → safe_band)..."
        sqlite3 spine/econet/db/constellation_index.db < spine/econet/tests/no_corridor_widening.sql

    - name: Prevent blacklisted terms
      run: |
        echo "Scanning for blacklisted terms..."
        ! grep -r -i "blake\|exergy\|digital.twin\|googolswarm" --include="*.rs" --include="*.aln" .

    - name: Upload ALN migration audit
      uses: actions/upload-artifact@v3
      with:
        name: aln-migration-audit
        path: spine/aln-platform/migrations/aln_migration_audit.log
