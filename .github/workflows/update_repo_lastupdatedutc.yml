# filename: .github/workflows/update_repo_lastupdatedutc.yml
# destination: eco_restoration_shard/.github/workflows/update_repo_lastupdatedutc.yml

name: Update repo.lastupdatedutc

on:
  push:
    branches:
      - main
      - master

jobs:
  update-lastupdatedutc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute timestamp and write lane-status shard
        run: |
          TS="$(date -u +"%Y%m%dT%H%M%SZ")"
          REPO_NAME="eco_restoration_shard"
          OUTPUT_DIR="lane-status"
          mkdir -p "${OUTPUT_DIR}"
          FILE_PATH="${OUTPUT_DIR}/lane_status_update_${TS}.sql"

          cat > "${FILE_PATH}" <<EOF
          PRAGMA foreign_keys = ON;
          UPDATE repo
          SET lastupdatedutc = '${TS}'
          WHERE name = '${REPO_NAME}';
          EOF

      - name: Upload shard as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lane_status_sql
          path: lane-status/
