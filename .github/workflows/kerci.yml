# FILE: .github/workflows/kerci.yml
# DESTINATION: .github/workflows/kerci.yml
# REPO-TARGET: github.com/mk-bluebird/eco_restoration_shard

name: KerResidual and Healthcare Fairness CI

on:
  push:
    paths:
      - "crates/kerresidual/**"
      - "crates/bioscale-fairness-validator/**"
      - "ecorestorationshard/sql/spine/dbdefinitionregistry.sql"
      - "ecorestorationshard/sql/eco_wealth/**"
      - ".github/workflows/kerci.yml"
  pull_request:
    paths:
      - "crates/kerresidual/**"
      - "crates/bioscale-fairness-validator/**"
      - "ecorestorationshard/sql/spine/dbdefinitionregistry.sql"
      - "ecorestorationshard/sql/eco_wealth/**"
      - ".github/workflows/kerci.yml"

jobs:
  kerci:
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"

      - name: Show cargo and rustc versions
        run: |
          rustc -V
          cargo -V

      - name: Build kerresidual
        working-directory: ./ecorestorationshard
        run: |
          cargo build -p kerresidual --release

      - name: Build bioscale-fairness-validator
        working-directory: ./ecorestorationshard
        run: |
          cargo build -p bioscale-fairness-validator --release

      - name: Run unit tests for kerresidual and bioscale-fairness-validator
        working-directory: ./ecorestorationshard
        run: |
          cargo test -p kerresidual -p bioscale-fairness-validator --all-features

      - name: Validate eco-wealth StewardEcoWealthStatement schema
        working-directory: ./ecorestorationshard
        run: |
          sqlite3 :memory: < sql/eco_wealth/dbstewardecowealthstatement.sql

      - name: Validate eco-wealth vshard views
        working-directory: ./ecorestorationshard
        run: |
          sqlite3 :memory: < sql/eco_wealth/dbvshardviews.sql

      - name: Validate definition registry spine
        working-directory: ./ecorestorationshard
        run: |
          sqlite3 :memory: < sql/spine/dbdefinitionregistry.sql

      - name: Check definition registry coverage
        working-directory: ./ecorestorationshard
        run: |
          cargo build -p definition-registry-checker
          cargo run -p definition-registry-checker -- \
            --root . \
            --definition-db sql/spine/dbdefinitionregistry.sql
