# filename: ker_ci.yml
# destination: eco_restoration_shard/.github/workflows/ker_ci.yml

name: KerResidual and Healthcare Fairness CI

on:
  push:
    paths:
      - "crates/kerresidual/**"
      - "crates/bioscale-fairness-validator/**"
      - "sql/eco_wealth/**"
      - ".github/workflows/ker_ci.yml"
  pull_request:
    paths:
      - "crates/kerresidual/**"
      - "crates/bioscale-fairness-validator/**"
      - "sql/eco_wealth/**"
      - ".github/workflows/ker_ci.yml"

jobs:
  ker_ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build kerresidual
        run: |
          cd eco_restoration_shard
          cargo build -p kerresidual --release

      - name: Build bioscale-fairness-validator
        run: |
          cd eco_restoration_shard
          cargo build -p bioscale-fairness-validator --release

      - name: Run tests
        run: |
          cd eco_restoration_shard
          cargo test -p kerresidual -p bioscale-fairness-validator

      - name: Validate eco-wealth SQL
        run: |
          cd eco_restoration_shard
          sqlite3 :memory: < sql/eco_wealth/dbvshard_views.sql
