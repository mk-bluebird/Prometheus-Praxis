[package]
name = "energy-metrics"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird"]
description = "Carbon intensity modeling and energy metrics for eco-restoration operations"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
approx = "0.5"

[lib]
path = "src/lib.rs"

[[bin]]
name = "energy-dashboard"
path = "src/bin/dashboard.rs"
required-features = []

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
overflow-checks = true

[profile.dev]
opt-level = 0
overflow-checks = true
