[package]
name = "sacrifice-zone-envelope"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Sacrifice Zone governance envelopes for Prometheus-Praxis and eco_restoration_shard."
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
homepage = "https://github.com/mk-bluebird/Prometheus-Praxis"
authors = ["Prometheus-Praxis / eco_restoration_shard"]

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }

[dev-dependencies]
serde_json = "1.0.120"
