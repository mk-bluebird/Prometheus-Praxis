[package]
name = "eco-wealth-portfolio"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Prometheus-Praxis eco wealth and health data TCR core crate"
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
authors = ["Prometheus-Praxis <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]

[lib]
name = "eco_wealth_portfolio"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
rusqlite = { version = "0.31", features = ["bundled", "chrono", "serde_json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
rust_decimal = { version = "1.36", features = ["serde"] }
thiserror = "1.0"

[features]
default = ["sqlite"]
sqlite = []
