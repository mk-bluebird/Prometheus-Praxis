[package]
name         = "eco-wealth-portfolio"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
description  = "Prometheus-Praxis eco wealth and health data TCR core crate"
repository   = "https://github.com/mk-bluebird/eco_restoration_shard"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]

[lib]
name       = "eco_wealth_portfolio"
path       = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
rusqlite     = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
serde_yaml   = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
log          = { workspace = true }
env_logger   = { workspace = true }
petgraph     = { workspace = true }
hex          = { workspace = true }
ed25519-dalek = { workspace = true }
tokio        = { workspace = true }

# Local-only numeric dependency; not in workspace yet.
rust_decimal = { version = "1.36", features = ["serde"] }

[features]
# Align with workspace style: default is non-actuating surface; no crate-local toggles
# are needed for SQLite, because rusqlite is already configured at workspace level.
default       = ["non_actuating"]
non_actuating = []
