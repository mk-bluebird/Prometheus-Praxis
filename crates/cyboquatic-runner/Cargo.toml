[package]
name = "cyboquatic-runner"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["mk-bluebird <host@organichain.local>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
description = "Cyboquatic scenario runner for Prometheus-Praxis operational proofs."
keywords = ["prometheus-praxis", "cyboquatic", "simulation", "governance"]
categories = ["science", "simulation"]

[lib]
name = "cyboquatic_runner"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = "1.0.120"
rand = "0.8"

prometheus-praxis-lyapunov-guard = { path = "../prometheus-praxis-lyapunov-guard" }
prometheus-praxis-cyboquatic = { path = "../prometheus-praxis-cyboquatic" }
agent-registry = { path = "../agent-registry" }

[dev-dependencies]
kani-verifier = "0.67"

[features]
default = []

[package.metadata.organichain]
hostdid = "didalnorganic-host"
bostromaddress = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
alnauthority = "ALN.MIGRATION.CYBERCOREAUTHORITY.v1"
alnshard.scenario = "cyboquatic-scenario-profile.v1.aln"
role = "CyboquaticScenarioRunner"

[profile.dev]
opt-level = 1
debug = true

[profile.release]
opt-level = 3
debug = false
lto = "thin"
codegen-units = 1
