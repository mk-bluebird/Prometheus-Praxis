[package]
name = "prometheus_praxis_semantics"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Semantic intent translation layer for Prometheus-Praxis, wiring Nyx-Semantix/Semanticus/Ontos-Veritas/Lex Machina/Janus-Veritas into MacroActionContext for the rights verification kernel."
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
keywords = ["eco-restoration", "governance", "semantics", "non-actuating"]

[dependencies]
chrono = { workspace = true }
rust_decimal = { workspace = true }
serde = { workspace = true, features = ["derive"] }

# Core governance kernel crate; this must match your existing name.
prometheus_praxis = { path = "../prometheus_praxis" }

[dev-dependencies]
serde_json = { workspace = true }
