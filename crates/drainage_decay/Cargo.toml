# File: crates/drainage_decay/Cargo.toml

[package]
name = "drainage_decay"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["mk-bluebird <host@organichain.local>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Cyboquatic drainage decay diagnostics (BOD/TSS/CEC, duty guards, EV conformal) for eco_restoration_shard."
keywords = ["eco_restoration", "cyboquatic", "drainage", "governance", "nonactuating"]
categories = ["science", "simulation"]

[lib]
name = "drainage_decay"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
thiserror = "1.0"

# If you later split out shared decay kernel math into a separate crate,
# you can add a path dependency here, e.g.:
# drainage_kernel = { path = "../drainage_kernel" }

[dev-dependencies]
kani-verifier = "0.67"

[package.metadata.organichain]
hostdid = "didalnorganic-host"
bostromaddress = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
alnauthority = "ALN.MIGRATION.CYBERCOREAUTHORITY.v1"
alnshard.duty = "drainage-duty-guard.v1.aln"
alnshard.ev = "ev-conformal-drainage.v1.aln"
role = "DrainageDecayDiagnosticKernel"

[profile.dev]
opt-level = 1
debug = true

[profile.release]
opt-level = 3
debug = false
lto = "thin"
codegen-units = 1
