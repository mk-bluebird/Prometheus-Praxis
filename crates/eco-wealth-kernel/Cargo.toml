[package]
name = "eco-wealth-kernel"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Eco-wealth kernel for Lyapunov residual computation and KER-plane aggregation."
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]

[lib]
name = "eco_wealth_kernel"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
kani-verifier = "0.67.0"

[build-dependencies]
cc = "1.0"

[features]
default = []
# Enable Kani proofs when running formal verification.
kani = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(rust_analyzer)", "cfg(kani)"] }
