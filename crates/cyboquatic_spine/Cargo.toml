# ecorestorationshard/crates/cyboquatic_spine/Cargo.toml

[package]
name = "cyboquatic_spine"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Non-actuating Cyboquatic blast-radius and eco-workload cdylib spine for EcoNet."
license = "MIT OR Apache-2.0"
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
readme = "README.md"
keywords = ["cyboquatic", "ecosafety", "spine", "blast-radius"]
categories = ["science", "algorithms"]

[lib]
name = "cyboquatic_spine"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
