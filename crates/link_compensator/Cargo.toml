[package]
name = "link_compensator"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["clock"] }
sha2 = "0.10"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"] }

[features]
default = []

[lib]
name = "link_compensator"
path = "src/lib.rs"

[[bin]]
name = "linkcompensator"
path = "src/main.rs"
