# filename Cargo.toml
# destination eco_restoration_shard/Cargo.toml

[package]
name = "eco_restoration_shard"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Eco restoration shard index and research harness for the EcoNet constellation."

[lib]
name = "eco_restoration_shard"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "eco_restoration_shard_cli"
path = "src/main.rs"

[features]
default = ["non_actuating"]
non_actuating = []

[dependencies]
rusqlite = { version = "0.31", features = ["bundled", "chrono"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
hex = "0.4"
tracing = "0.1"
clap = { version = "4.5", features = ["derive"] }

[dev-dependencies]
tempfile = "3.10"
