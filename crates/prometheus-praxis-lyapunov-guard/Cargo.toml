[package]
name = "prometheus-praxis-lyapunov-guard"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["mk-bluebird <host@organichain.local>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
description = "Ecosystem KER Lyapunov guard for eco-labour anchored evolution in Prometheus-Praxis."
keywords = ["organichain", "ker", "lyapunov", "eco-labour"]
categories = ["science", "simulation"]

[lib]
name = "prometheus_praxis_lyapunov_guard"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = "1.0.120"
thiserror = "1.0"

[dev-dependencies]
kani-verifier = "0.67"

[features]
default = []

[package.metadata.organichain]
hostdid = "didalnorganic-host"
bostromaddress = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
alnauthority = "ALN.MIGRATION.CYBERCOREAUTHORITY.v1"
alnshard = "ecosystem-ker-profile.v1.aln"
role = "KerLyapunovGuard"

[profile.dev]
opt-level = 1
debug = true

[profile.release]
opt-level = 3
debug = false
lto = "thin"
codegen-units = 1
