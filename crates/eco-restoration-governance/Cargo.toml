# filename: Cargo.toml
# destination: crates/eco-restoration-governance/Cargo.toml

[package]
name = "eco-restoration-governance"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Governance, eco-reward, and KER-aligned policy helpers for eco_restoration_shard."
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
readme = "README.md"
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"] }

[features]
# Default to non-actuating, read-only governance helpers.
default = ["nonactuating"]
nonactuating = []
