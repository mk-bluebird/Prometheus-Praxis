# filename: crates/eco_restoration_index/Cargo.toml

[package]
name = "eco_restoration_index"
version = "0.1.0"
edition = "2024"

[lib]
name = "eco_restoration_index"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "eco_restoration_migrate"
path = "src/bin/migrate.rs"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
