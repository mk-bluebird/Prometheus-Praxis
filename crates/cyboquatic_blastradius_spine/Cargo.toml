# filename: crates/cyboquatic_blastradius_spine/Cargo.toml
# destination: eco_restoration_shard/crates/cyboquatic_blastradius_spine/Cargo.toml

[package]
name        = "cyboquatic_blastradius_spine"
version     = "0.1.0"
edition     = "2024"
license     = "MIT OR Apache-2.0"
authors     = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
repository  = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.85"
description = "Non-actuating Cyboquatic blast-radius and workload spine over EcoNet / ecosafety SQLite."

[dependencies]
rusqlite   = { version = "0.31", features = ["bundled"] }
serde      = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono     = { version = "0.4.38", features = ["serde"] }
thiserror  = "1.0.57"
log        = "0.4.21"
env_logger = "0.11.3"

[lib]
name = "cyboquatic_blastradius_spine"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]
