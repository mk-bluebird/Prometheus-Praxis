# filename: crates/econet_blastradius_spine/Cargo.toml
[package]
name        = "econet_blastradius_spine"
version     = "0.1.0"
edition     = "2024"
rust-version = "1.85"
license     = "MIT OR Apache-2.0"
authors     = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
repository  = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Non-actuating cross-spine KER-weighted blast-radius kernel for Cyboquatic and EcoNet governance."

[lib]
name       = "econet_blastradius_spine"
path       = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[dependencies]
rusqlite   = { version = "0.31.0", features = ["bundled"] }
serde      = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
thiserror  = { version = "1.0.57" }
