# Filename: crates/cyboquatic-ecosafety-turbine-wl01/Cargo.toml

[package]
name         = "cyboquatic-ecosafety-turbine-wl01"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
authors      = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
description  = "Phoenix PHX-CANAL-NODE-WL-01 turbine ecosafety bindings for rsurcharge, fish shear, ramp/turbulence, biodiversity, pathogen, and KER/SafeStep integration."
repository   = "https://github.com/mk-bluebird/Prometheus-Praxis"
homepage     = "https://github.com/mk-bluebird/Prometheus-Praxis"
readme       = "../../README.md"

[package.metadata]
aln-did      = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
aln-hexstamp = "0xa1b2c3d4e5f67890f1e2d3c4b5a69788"

[lib]
name       = "cyboquatic_ecosafety_turbine_wl01"
path       = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "cyboquatic-ecosafety-turbine-wl01-ci"
path = "src/main.rs"

[dependencies]
# Core ecosafety spine: rx, Vt, KER, SafeStepGate, RiskVector.
cyboquatic-ecosafety-core = { path = "../cyboquatic-ecosafety-core" }

# Turbine-specific hydraulics, habitat, and fish-shear math objects.
cyboquatic-ecosafety-hydroturbine = { path = "../cyboquatic-ecosafety-hydroturbine" }

# Optional: serde for structured shard parsing if needed by src/main.rs.
serde      = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
# Kani verifier is required for this crate; version is pinned and non-optional.
kani-verifier = { version = "0.67.0" }

[features]
# Ecosafety bindings are always on; no optional safety features.
default  = ["ecosafety"]
ecosafety = []
