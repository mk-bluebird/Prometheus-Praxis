# filename: crates/prometheus_praxis_ai/Cargo.toml

[package]
name        = "prometheus_praxis_ai"
version     = "0.1.0"
edition     = "2024"
rust-version = "1.85"
license     = "MIT OR Apache-2.0"
authors     = [
    "mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"
]
description = "Ecosafety governance spine for multi-band Lyapunov/KER control of hydraulics, cyboquatic workloads, and AI datacenter nodes in the Prometheus-Praxis mono-repo."
repository  = "https://github.com/mk-bluebird/Prometheus-Praxis"
keywords    = ["ecosafety", "Lyapunov", "KER", "FFI", "AI", "hydraulics"]
categories  = ["science", "simulation", "environment"]

[lib]
name       = "prometheus_praxis_ai"
crate-type = ["rlib"]
path       = "src/lib.rs"

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
rusqlite = { version = "0.31.0", features = ["bundled"] }
libc = "0.2.155"
time = { version = "0.3.36", features = ["macros", "serde"] }
log = "0.4.21"
tracing = { version = "0.1.40", features = ["log", "serde"] }

# ALN / particle grammar host; this must point at an existing crate.
particle = "0.5.0"

[dev-dependencies]
kani-verifier = "0.67.0"

[profile.dev]
opt-level        = 1
debug            = true
overflow-checks  = true
lto              = "off"
panic            = "abort"

[profile.release]
opt-level        = 3
debug            = false
overflow-checks  = true
lto              = "fat"
codegen-units    = 1
panic            = "abort"

[features]
# By default, the crate builds with FFI enabled but remains strictly non-actuating.
default = ["ffi"]

# FFI bindings to C++ numeric engine libraries (eco_engine_drainage, eco_engine_workload, eco_engine_ai_node).
ffi = []

# Optional integration with external audit/logging backends, while still emitting NDJSON/SQLite locally.
audit-siem = []

[package.metadata.prometheus_praxis_ai]
role = "ecosafety_spine"
bands = ["hydraulics_drainage", "workload_energetics", "ai_node_energetics"]
hex_anchor = "PHX_PROMETHEUS_PRAXIS_AI_ENGINE20260723"
did_root = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
non_actuating = true
