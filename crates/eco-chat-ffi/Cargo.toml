[package]
name = "eco-chat-ffi"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Readonly Rust tool surface exposing UTF-8 JSON over the governance/index DB for AI-chat agents."
publish = false

[lib]
name = "eco_chat_ffi"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[dependencies]
rusqlite  = { version = "0.31", features = ["bundled"] }
serde     = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror  = "1.0"

# kerdeployable is a workspace peer; resolved from workspace root.
kerdeployable = { path = "../kerdeployable" }
ecoresponseshard = { path = "../ecoresponseshard" }
