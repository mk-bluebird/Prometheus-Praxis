# path: crates/titan-metrics-core/Cargo.toml

[package]
name = "titan-metrics-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Prometheus-Praxis Lyapunov and corridor metrics core, including Smartflower slices for eco_restoration_shard."
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
authors = ["Prometheus-Praxis <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]

[lib]
name = "titan_metrics_core"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
csv = "1.3.0"
chrono = { version = "0.4.38", default-features = false, features = ["clock", "serde"] }
rust_decimal = { version = "1.36.0", features = ["serde"] }
thiserror = "1.0.63"

[dev-dependencies]
kani = "0.67.0"

[features]
default = []
smartflower = []
