# filename: cyboquatic-ecosafety/Cargo.toml
# destination: cyboquatic-ecosafety/Cargo.toml

[package]
name = "cyboquatic-ecosafety"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Non-actuating, KER-aware ecosafety diagnostics for Cyboquatic nodes in Phoenix, 2026."
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
readme = "README.md"
publish = false

[lib]
name = "cyboquatic_ecosafety"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "migration_runner"
path = "src/bin/migration_runner.rs"

[features]
privacy = []

# Default: pure diagnostic core with no optional backends.
default = []

# Enable full covariance matrix and enriched numerical diagnostics.
full-cov = []

# Optional SQLite-backed storage for shard updates.
sqlite-storage = []

# Optional Prometheus metrics export for frame timing and health.
metrics = []

# Optional Android/JNI bindings (cdylib) for mobile overlays.
android = []

# Optional wasm-bindgen bindings for browser-side diagnostics.
wasm = []

[dependencies]
chrono = { version = "0.4.38", features = ["clock", "std"] }
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
# Benchmarking for frames and pipeline.
criterion = "0.5.1"

# Kani harnesses live in a dedicated crate; Kani itself is brought in
# there, not as an optional feature here.

[[example]]
name = "pipeline_demo"
path = "examples/pipeline_demo.rs"
