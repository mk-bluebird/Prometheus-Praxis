[package]
name = "ecoresponseshard"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Non-actuating response-index API: KER + Dcombined readonly surface for all agents."
publish = false

[lib]
name = "ecoresponseshard"
path = "src/lib.rs"

[[bin]]
name = "eco_response_backfill"
path = "src/bin/backfill.rs"

[[bin]]
name = "eco_response_ci"
path = "src/bin/ci_helper.rs"

[features]
default = ["nonactuating"]
nonactuating = []

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
serde_json = "1.0"
