[package]
name = "ecoresponseshard"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Non-actuating KER + D_combined readonly surface for all agents."
publish = false

[lib]
name = "ecoresponseshard"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "eco_response_backfill"
path = "src/bin/backfill.rs"

[[bin]]
name = "eco_response_ci"
path = "src/bin/ci_helper.rs"

[features]
# Non-actuating is always enforced; kept for compatibility with other crates.
default = ["nonactuating", "kani"]
nonactuating = []
# Kani must never be optional; this feature is always enabled via `default`.
kani = []

[dependencies]
rusqlite   = { version = "0.31", features = ["bundled"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror  = "1.0"
chrono     = { version = "0.4", features = ["serde"] }
kani       = "0.51"

[dev-dependencies]
serde_json = "1.0"
kani       = "0.51"
