[package]
name = "ecosafety-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["Prometheus-Praxis / eco_restoration_shard"]
description = "Core ecosafety spine for Cyboquatic and EcoNet systems: normalized risk coordinates rx, Lyapunov residual Vt, Tree-of-Life weights, and KER windows."
readme = "README.md"
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
keywords = ["ecosafety", "lyapunov", "risk-vector", "ker", "cyboquatic"]
categories = ["science", "simulation", "embedded"]

[lib]
name = "ecosafety_core"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
thiserror = "1.0.63"
# Optional, but useful for small numeric utilities and tests
itertools = "0.13.0"

[dev-dependencies]
kani-verifier = "0.67.0"
serde_yaml = "0.9.34"

[features]
default = ["std"]
std = []
nostd = []

[profile.dev]
opt-level = 1
debug = true
overflow-checks = true

[profile.release]
opt-level = 3
debug = false
lto = "fat"
codegen-units = 1
overflow-checks = true
panic = "abort"

[workspace]
# This assumes ecosafety-core sits inside the eco_restoration_shard mono-repo workspace.
members = []
