# filename: crates/steward_identity/Cargo.toml

[package]
name = "steward_identity"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Shared steward identity types and ALN-friendly helpers for EcoNet / Cyboquatics."
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
readme = "README.md"
keywords = ["ecosafety", "aln", "identity", "steward"]
categories = ["science", "config"]

[lib]
# Default crate-type (rlib) is sufficient; ensure path is explicit and valid
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
thiserror = "1.0.64"
time = { version = "0.3.36", features = ["formatting", "parsing", "macros"] }

# Kani is mandatory and non-optional; used for formal verification of identity logic.
kani-verifier = { version = "0.67.0" }

[dev-dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }

# Optional example-specific features (kept minimal to avoid widening surface).
[features]
default = []
# Enable this when running Kani proofs over steward identity invariants.
kani = []

[workspace]
# This crate is intended to live inside the Prometheus-Praxis mono-repo workspace.
# The top-level Cargo.toml should include:
# [workspace]
# members = [
#     "crates/steward_identity",
#     # ... other crates
# ]
members = ["."]
