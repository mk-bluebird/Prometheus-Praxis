# crates/ker_triad/Cargo.toml

[package]
name = "ker_triad"
version = "0.3.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Prometheus-Praxis KER triad + ESS distribution and KS dominance gate"
authors = ["mk-bluebird <cybercore@organichain.org>"]
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
readme = "README.md"
keywords = ["KER", "eco-restoration", "Praxis", "ESS", "governance"]
categories = ["science", "simulation", "mathematics"]
publish = false

[dependencies]
rust_decimal = "1.36"
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
rand = "0.8"
statrs = "0.16"

# Core KER engine, already defined in your blueprint.
prometheuspraxisker = { path = "../prometheuspraxisker" }

[dev-dependencies]
kani-verifier = "0.67"

[features]
# Default is pure, non-actuating numeric kernels only.
default = ["pure-kernels"]
pure-kernels = []
# Future: allow pulling scenario sets from qpudatashard.
qpudatashard-binding = []
# Future: allow more advanced distribution fitting (copulas, etc.).
advanced-distributions = []

[package.metadata.kani]
# Kani is mandatory, not optional, per space rules.
version = "0.67"
enable = true
harnesses = ["ess_ks_dominance_harness_stub"]

[package.metadata.prometheuspraxis]
# Bind this crate into Prometheus-Praxis / Perkunos-Nexus grammar.
role = "KER triad + ESS scalar and stochastic dominance gate"
domain = "eco_restoration_shard"
non_actuating = true
sovereignty_first = true

[package.metadata.ker]
axes = ["knowledge", "eco_impact", "risk_of_harm"]
ess_scalar = true
ess_state_dimensions = 9
stochastic_dominance_gate = "KS-first-order"
roh_ceiling_global = "0.30"

[package.metadata.aln]
# Hook for ALN envelopes once ESS corridors are fully encoded.
ess_envelope_shard = "praxis.ess.envelope.v1.aln"
ker_envelope_shard = "praxis.ker.envelope.v1.aln"
lane_envelope_shard = "praxis.lane.core.v1.aln"

[package.metadata.sovereignty]
host_did = "did:aln:organic-host"
bostrom_address = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
authority_shard = "ALN.MIGRATION.CYBERCOREAUTHORITY.v1"
non_rollback = true

[package.metadata.regulatory]
eu_ai_act_article9_high_risk = true
iec_62304_safety_class = "B"
iso_13485_traceability_shard = "nanorobotics.obs.metrics.schema.v1.aln"
roh_ceiling_global = "0.30"
proof_artifacts = ["kani:ess_ks_dominance", "kani:ker_monotone_evolution"]
