# eco_restoration_shard/crates/prometheus_praxis_collective_feed/Cargo.toml

[package]
name = "prometheus_praxis_collective_feed"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Collective Intelligence Feed for Prometheus-Praxis: advisory-only KER enrichment from Noosphere, Gemeinschaft-Verein, and innovation signals under strict safety bounds."
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
keywords = ["governance", "collective-intelligence", "ker", "non-actuating"]

[lib]
name = "prometheus_praxis_collective_feed"
path = "src/lib.rs"

[dependencies]
rust_decimal = { workspace = true }
serde = { workspace = true, features = ["derive"] }

# Optionally depend on the core governance crate for shared types.
# prometheus_praxis = { path = "../prometheus_praxis", optional = true }

[dev-dependencies]
serde_json = { workspace = true }
kani = { version = "0.67", default-features = false }

[features]
# Advisory-only by design: can be compiled out if collective signals are disabled.
advisory_only = []

[package.metadata.ai_governance]
standard = "ISO/IEC 42001"
scope = "Governance Spine - Collective Intelligence"
control_mapping = ["6.1", "9.2", "11"]
purpose = "Aggregates community and innovation signals into KER-adjacent evidence under strict bounds, enriching decisions without relaxing core safety invariants."

[package.metadata.eu_ai_act]
risk_roles = ["advisory_enrichment"]
articles_supported = ["9-15"]
risk_categories = ["High", "Limited", "Minimal"]
