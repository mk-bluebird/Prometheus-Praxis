# FILE: ecorestorationshard/Cargo.toml
# DESTINATION: ecorestorationshard/Cargo.toml
# REPO-TARGET: github.com/mk-bluebird/eco_restoration_shard

[package]
name = "ecorestorationshard"
version = "0.2.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
description = "Eco restoration shard index and non-actuating EcoNet/Eco-Restoration cdylib spine for Cyboquatic diagnostics (blast-radius, workloads, energy, restoration)."
publish = false

[lib]
name = "ecorestorationshard"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "restorationindextool"
path = "src/bin/restorationindextool.rs"

[features]
# "nonactuating" is the default; cdylib exposes diagnostics only.
default = ["nonactuating", "sqlite_readonly"]
nonactuating = []
sqlite_readonly = []

[dependencies]
# Core serialization stack (explicit versions, aligned with space instructions).
serde       = { version = "1.0.203", features = ["derive"] }
serde_json  = { version = "1.0.120" }
thiserror   = "1.0.63"

# SQLite and time
rusqlite    = { version = "0.31.0", features = ["bundled"] }
chrono      = { version = "0.4.38", default-features = false, features = ["clock", "serde"] }

# Logging for the bin and any diagnostic tooling
log         = "0.4.21"
env_logger  = "0.11.3"

# Optional CSV utilities for the bin/tooling (but linked explicitly).
csv         = "1.3.0"

[dev-dependencies]
# Kani is required, never optional.
kani = "0.67.0"

serde       = { version = "1.0.203", features = ["derive"] }
serde_json  = { version = "1.0.120" }
chrono      = { version = "0.4.38", default-features = false, features = ["clock", "serde"] }
csv         = "1.3.0"
log         = "0.4.21"
env_logger  = "0.11.3"

[package.metadata.ecosafety]
non_actuating_only = true
roleband           = "RESEARCH"
primary_plane      = "CARBON"
