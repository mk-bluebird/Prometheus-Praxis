# FILE: ecorestorationshard/Cargo.toml
# DESTINATION: ecorestorationshard/Cargo.toml
# REPO-TARGET: github.com/mk-bluebird/eco_restoration_shard

[package]
name = "ecorestorationshard"
version = "0.2.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
rust-version = "1.85"
description = "Eco restoration shard index and research harness for the EcoNet constellation."
publish = false

[lib]
name = "ecorestorationshard"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "restorationindextool"
path = "src/bin/restorationindextool.rs"

[features]
default = ["nonactuating"]
nonactuating = []

[dependencies]
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
csv = { workspace = true }
