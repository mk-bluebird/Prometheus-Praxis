[package]
name = "ppx_continuity_kernel"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[lib]
name = "ppx_continuity_kernel"
crate-type = ["rlib"]

[features]
default = []
# Enable this feature in CI or build.rs of dependent crates to run PPX invariant checks.
ppx-validator = []

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

# The following crate is your existing PPX invariant engine for no-identity-classification.
# Ensure the path/name matches your actual repo layout for:
# `aletheion_identity_ppx_no_identity_classification` or equivalent.
aletheion-identity-ppx-no-identity-classification = { path = "../aletheion_identity_ppx_no_identity_classification", optional = true }

[features.ppx-validator]
dependencies = ["aletheion-identity-ppx-no-identity-classification"]

[dev-dependencies]
tempfile = "3.10"
