[package]
name = "prometheus_praxis"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-or-later"
description = "Prometheus-Praxis adaptive implementation engine under Cybercore authority."
repository = "https://github.com/mk-bluebird/Cybercore.git"

[features]
default = ["metrics"]
metrics = ["prometheus"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
prometheus = { version = "0.13", optional = true }
once_cell = "1"

transhuman_rights_core = { path = "../transhuman-rights-core" }   # from your stack [file:14]
bioscale_metrics       = { path = "../bioscale-metrics" }          # Bounded01 etc. [file:14]
aln_runtime            = { path = "../aln-runtime" }               # your ALN loader/binder [file:14]
veritas_chain_client   = { path = "../veritas-chain-client" }      # append-only hex-trace logging [file:1][file:14]
equality_payment_guard = { path = "../equality-payment-guard" }    # BioPay/EqualityCredit [file:15]
aug_fingerprint_guard  = { path = "../aug-fingerprint-guard" }     # POS / BioPay layer [file:11][file:13]
