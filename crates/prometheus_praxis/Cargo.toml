[package]
name = "prometheus_praxis"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
description = "Prometheus-Praxis adaptive implementation engine under Cybercore authority."
repository = "https://github.com/mk-bluebird/eco_restoration_shard"

[features]
default = ["metrics"]
metrics = ["dep:prometheus"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
prometheus = { version = "0.13", optional = true }
once_cell = "1.19"
rust_decimal = { version = "1.35", features = ["serde-with-str"] }
chrono = { version = "0.4", features = ["serde"] }

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
