# filename: Cargo.toml
# destination: crates/kerresidual/Cargo.toml
# repo-target: github.com/mk-bluebird/eco_restoration_shard

[package]
name = "kerresidual"
version = "0.1.0"
edition = "2024"
description = "Shared Lyapunov residual and KER band spine for EcoNet / EcoFort constellation."
license = "MIT"
repository = "https://github.com/mk-bluebird/eco_restoration_shard"
readme = "README.md"
keywords = ["ecosafety", "ker", "residual", "lyapunov"]
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"]
publish = false

[lib]
name = "kerresidual"
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
# Non-actuating is the default; no feature may weaken ecosafety guards.
default = ["nonactuating"]
nonactuating = []

[dependencies]
serde = { version = "1.0.197", features = ["derive"] }
kani = { version = "0.53.0" }

[dev-dependencies]
serde_json = "1.0.115"
