# File: crates/cyboquatic-ecosafety-hydroturbine/Cargo.toml
# License: MIT OR Apache-2.0
# This crate is non-actuating and diagnostic-only; it depends on the core ecosafety spine
# and on Kani 0.67 for formal verification harnesses.

[package]
name = "cyboquatic-ecosafety-hydroturbine"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
description = "Domain-specific ecosafety crate for PHX-CANAL-NODE-WL-01 fish-safe hydroturbines, built on the cyboquatic-ecosafety-core Lyapunov spine."
readme = "README.md"
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
homepage = "https://github.com/mk-bluebird/Prometheus-Praxis"
keywords = ["ecosafety", "hydroturbine", "lyapunov", "fish-passage", "phoenix"]
categories = ["science", "simulation", "environment"]
publish = false

[dependencies]
cyboquatic-ecosafety-core = { path = "../cyboquatic-ecosafety-core", version = "0.1.0" }

[dev-dependencies]
kani = { version = "0.67", features = ["derive"] }

[lib]
name = "cyboquatic_ecosafety_hydroturbine"
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
# No actuation features are allowed; this crate is strictly diagnostic.
default = []
# Enable Kani verification harnesses when running `cargo kani`.
kani-verify = []

[package.metadata.kani]
# Non-optional Kani configuration for this crate.
enable = true
version = "0.67"
