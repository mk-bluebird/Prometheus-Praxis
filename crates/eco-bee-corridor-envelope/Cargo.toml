[package]
name = "eco-bee-corridor-envelope"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Bee wellness corridor envelopes and evidence bundles for Sunflower eco-safety"
authors = ["bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7 <eco_restoration_shard>"]

[lib]
name = "eco_bee_corridor_envelope"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
kani = "0.67.0"

[features]
default = []
# Feature for compiling Kani harnesses
kani-harnesses = []
