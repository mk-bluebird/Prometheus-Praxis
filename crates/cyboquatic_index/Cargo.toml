# eco_restoration_shard/cyboquatic_index/Cargo.toml

[package]
name = "cyboquatic_index"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Cyboquatic index and migration tool for ecosafety shards and rusqlite-backed indices."
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
readme = "README.md"
keywords = ["cyboquatic", "index", "ecosafety", "sqlite"]
categories = ["science", "database"]

[lib]
name = "cyboquatic_index"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "cyboquatic_migrate"
path = "src/bin/migrate.rs"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
