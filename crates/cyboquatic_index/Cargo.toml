# filename: cyboquatic_index/Cargo.toml
# destination: eco_restoration_shard/cyboquatic_index/Cargo.toml

[package]
name = "cyboquatic_index"
version = "0.1.0"
edition = "2024"

[lib]
name = "cyboquatic_index"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "cyboquatic_migrate"
path = "src/bin/migrate.rs"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
