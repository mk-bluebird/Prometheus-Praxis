# crates/cyboquatic-qpudatashard/Cargo.toml
[package]
name = "cyboquatic-qpudatashard"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"
description = "Cyboquatic qpudatashard crate for normalized risk vectors and telemetry in eco-restoration workloads."
rust-version = "1.85"

[lib]
name = "cyboquatic_qpudatashard"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }

[features]
default = ["non_actuating"]
non_actuating = []
