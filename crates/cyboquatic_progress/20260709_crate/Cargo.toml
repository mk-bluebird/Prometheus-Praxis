# filename: eco_restoration_shard/crates/cyboquatic_progress/20260709_crate/Cargo.toml

[package]
name = "cyboquatic_workload20260709"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
description = "Daily cyboquatic progress crate for 2026-07-09: workload energy requirement and Lyapunov-safe ΔVt corridor for Phoenix canal node workloads."

[lib]
name = "cyboquatic_workload20260709"
crate-type = ["rlib"]
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
rusqlite = { version = "0.31.0", features = ["bundled"] }

[dev-dependencies]
kani-verifier = "0.67.0"

[profile.dev]
opt-level = 1
debug = true
overflow-checks = true

[profile.release]
opt-level = 3
debug = false
lto = "fat"
codegen-units = 1
overflow-checks = true
panic = "abort"
