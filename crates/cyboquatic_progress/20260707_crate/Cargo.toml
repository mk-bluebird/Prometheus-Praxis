# filename: eco_restoration_shard/crates/cyboquatic_progress/20260707_crate/Cargo.toml

[package]
name = "cyboquatic_progress_20260707"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["mk-bluebird <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
description = "Daily cyboquatic progress shard for 2026-07-07: drainagedecay frame with TSS-bound water-quality indicator and KER triad."
repository = "https://github.com/mk-bluebird/Prometheus-Praxis"

[lib]
name = "cyboquatic_progress_20260707"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
rusqlite = { version = "0.31.0", features = ["bundled"] }
chrono = { version = "0.4.38", features = ["serde"] }
thiserror = "1.0.57"
hex = "0.4.3"
log = "0.4.21"
env_logger = "0.11.3"

[dev-dependencies]
serde_json = { version = "1.0.120" }

[features]
# Non-actuating by default, read-only SQLite except for explicit research logging.
default = ["non_actuating"]
non_actuating = []
