[package]
name = "ker-intelligence-scheduler"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
publish = false
authors = ["Augmented Citizen <bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7>"]
description = "Lyapunov- and KER-aware workload scheduler maximizing intelligence I = -Vdot_total / P under monotone corridor tightening."
repository = "https://github.com/mk-bluebird/eco_restoration_shard"

[dependencies]
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.120" }
nalgebra = "0.32"
ordered-float = "4.2"
anyhow = "1.0"
thiserror = "1.0"

# Observability and governance hooks – resolved via workspace-level dependencies.
prometheus = "0.13"
tokio = { version = "1.37", features = ["rt-multi-thread", "macros"] }

[dev-dependencies]
kani-verifier = "0.67"

[features]
default = []
kani = []
